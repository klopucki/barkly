<article class="mb-4 rounded-xl border border-gray-200 p-4 shadow-sm">
  <h2 class="text-xl font-semibold">{{ training().title }}</h2>

  <p class="text-gray-600">Trainer: {{ training().trainerName }}</p>
  <p class="text-gray-600">Level: {{ training().level }}</p>
  <p class="text-gray-600">Date: {{ training().startAt }}</p>

  <p class="text-gray-600">
    Places:
    @if (training().capacity === null) {
      unlimited
    } @else {
      {{ training().bookedCount }} / {{ training().capacity }}
    }
  </p>
  <div class="mt-4 flex gap-2">

    <a
      [routerLink]="['/trainings', training().id]"
      class="rounded-lg border border-gray-300 px-4 py-2"
    >
      Details
    </a>

  </div>
</article>
