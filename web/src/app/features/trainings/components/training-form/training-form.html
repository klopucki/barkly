<form
  class="mt-6 space-y-4 rounded-xl border border-gray-200 p-4"
  [formGroup]="form"
  (ngSubmit)="submit()"
>
  <h2 class="text-xl font-semibold">Add training</h2>

  <input class="w-full rounded border p-2" placeholder="Title" formControlName="title" />
  <input class="w-full rounded border p-2" placeholder="Trainer name" formControlName="trainerName" />

  <select class="w-full rounded border p-2" formControlName="level">
    @for (level of levels; track level) {
      <option [value]="level">{{ level }}</option>
    }
  </select>

  <input class="w-full rounded border p-2" type="datetime-local" formControlName="startAt" />
  <input class="w-full rounded border p-2" type="number" placeholder="Capacity" formControlName="capacity" />

  <div class="flex gap-2">
    <button class="rounded-lg bg-black px-4 py-2 text-white" type="submit">
      Save
    </button>

    <button class="rounded-lg border border-gray-300 px-4 py-2" type="button" (click)="cancel()">
      Cancel
    </button>
  </div>
</form>
