<section>
  <div class="mb-6 flex items-center justify-between"><h1 class="text-3xl font-bold">Szkoły</h1>@if (auth.currentUser()) {<a routerLink="/my-school" class="rounded-lg bg-black px-4 py-2 text-white">Moje szkoły</a>}</div>
  <div class="grid gap-4 md:grid-cols-2">
    @for (school of items(); track school.id) {
      <a [routerLink]="['/schools', school.slug]" class="rounded-xl border border-gray-200 p-5 hover:border-black">
        <h2 class="text-xl font-semibold">{{ school.name }}</h2><p class="mt-1 text-gray-600">{{ school.address }}</p><p class="mt-3 line-clamp-3">{{ school.description || school.activities }}</p>
      </a>
    } @empty { <p class="text-gray-500">Nie ma jeszcze szkół.</p> }
  </div>
</section>
