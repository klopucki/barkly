
<section>
  <h1 class="mb-6 text-3xl font-bold">Trainings</h1>
  <button
    type="button"
    class="mb-6 rounded-lg bg-black px-4 py-2 text-white"
    (click)="openAddTraining()"
  >
    Add training
  </button>

  @if (isAddTrainingOpen()) {
    <app-modal
      [title]="editingTraining() ? 'Edit training' : 'Add training'"
      (closed)="closeAddTraining()"
    >
      <app-training-form
        [training]="editingTraining()"
        (trainingSubmitted)="saveTraining($event)"
        (cancelled)="closeAddTraining()"
      />
    </app-modal>
  }

  @if (addTrainingError()) {
    <p class="mb-4 text-sm text-red-600">{{ addTrainingError() }}</p>
  }

  <input
    class="mb-6 w-full rounded border p-2"
    placeholder="Search by title, trainer or level..."
    #searchInput
    (input)="searchText.set(searchInput.value)"
  />

  @if (isLoading()) {
    <p class="mb-4 text-gray-500">Loading trainings...</p>
  }

  @if (trainings().length === 0) {
    <p class="text-gray-500">No trainings found.</p>
  } @else {
    @for (training of trainings(); track training.id) {
      <app-training-card
        [training]="training"
        (editClicked)="openEditTraining($event)"
        (deleteClicked)="deleteTraining($event)"
      />
    }
  }
</section>
