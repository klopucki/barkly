<section class="mx-auto max-w-md"><div class="mb-6 flex gap-2"><button type="button" class="rounded px-3 py-2" [class.bg-black]="mode()==='login'" [class.text-white]="mode()==='login'" (click)="setMode('login')">Logowanie</button><button type="button" class="rounded px-3 py-2" [class.bg-black]="mode()==='register'" [class.text-white]="mode()==='register'" (click)="setMode('register')">Rejestracja</button></div><form class="space-y-4" novalidate (ngSubmit)="submit()">@if(mode()==='register'){<input class="w-full rounded border p-2" [(ngModel)]="displayName" name="displayName" placeholder="Imię (min. 2 znaki)" minlength="2" maxlength="100"/><label class="block text-sm" for="role">Typ konta</label><select id="role" class="w-full rounded border p-2" [(ngModel)]="role" name="role"><option value="USER">Użytkownik</option><option value="SCHOOL_ADMIN">Administrator szkoły</option></select>}<input class="w-full rounded border p-2" [(ngModel)]="email" name="email" type="email" placeholder="E-mail" maxlength="320"/><input class="w-full rounded border p-2" [(ngModel)]="password" name="password" type="password" placeholder="Hasło (min. 10 znaków)" minlength="10" maxlength="100"/><button type="submit" class="rounded bg-black px-4 py-2 text-white">{{mode()==='login'?'Zaloguj się':'Załóż konto'}}</button>@if(error){<p class="text-red-600">{{error}}</p>}</form></section>
