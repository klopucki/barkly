<header class="border-b border-gray-200 bg-white">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
    <a routerLink="/" class="text-2xl font-bold">
      Barkly
    </a>

    <nav class="flex gap-4 text-sm">
      <a routerLink="/" routerLinkActive="font-bold">Home</a>
      <a routerLink="/schools" routerLinkActive="font-bold">Schools</a>
      <a routerLink="/trainings" routerLinkActive="font-bold">Trainings</a>
      <a routerLink="/news" routerLinkActive="font-bold">News</a>
      @if (auth.currentUser()) {
        @if (auth.currentUser()?.role !== 'USER') {<a routerLink="/my-school" routerLinkActive="font-bold">Moje szkoły</a>}
        <button type="button" (click)="auth.logout()">Wyloguj</button>
      } @else {
        <a routerLink="/account" routerLinkActive="font-bold">Zaloguj</a>
      }
    </nav>
  </div>
</header>

<main class="mx-auto max-w-6xl px-6 py-8">
  <router-outlet />
</main>

<footer class="border-t border-gray-200 px-6 py-4 text-center text-sm text-gray-500">
  Barkly &copy; 2026
</footer>
