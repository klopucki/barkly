name: Barkly CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew :api:test

      - name: Build backend JAR
        run: ./gradlew :api:bootJar -x test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: barkly-api:${{ github.sha }}
          cache-from: type=gha,scope=barkly-api
          cache-to: type=gha,mode=max,scope=barkly-api
          outputs: type=docker,dest=/tmp/barkly-api.tar

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          tags: barkly-web:${{ github.sha }}
          cache-from: type=gha,scope=barkly-web
          cache-to: type=gha,mode=max,scope=barkly-web
          outputs: type=docker,dest=/tmp/barkly-web.tar

      - name: Upload API image
        uses: actions/upload-artifact@v7
        with:
          name: barkly-api-image
          path: /tmp/barkly-api.tar
          retention-days: 1

      - name: Upload web image
        uses: actions/upload-artifact@v7
        with:
          name: barkly-web-image
          path: /tmp/barkly-web.tar
          retention-days: 1

  docker-publish:
    name: Publish Docker images
    runs-on: ubuntu-latest

    needs:
      - docker-build

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Download API image
        uses: actions/download-artifact@v8
        with:
          name: barkly-api-image
          path: /tmp

      - name: Download web image
        uses: actions/download-artifact@v8
        with:
          name: barkly-web-image
          path: /tmp

      - name: Load Docker images
        run: |
          docker load --input /tmp/barkly-api.tar
          docker load --input /tmp/barkly-web.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and publish API image
        run: |
          docker tag \
            barkly-api:${{ github.sha }} \
            ghcr.io/${{ github.repository_owner }}/barkly-api:${{ github.sha }}

          docker tag \
            barkly-api:${{ github.sha }} \
            ghcr.io/${{ github.repository_owner }}/barkly-api:latest

          docker push \
            ghcr.io/${{ github.repository_owner }}/barkly-api:${{ github.sha }}

          docker push \
            ghcr.io/${{ github.repository_owner }}/barkly-api:latest

      - name: Tag and publish web image
        run: |
          docker tag \
            barkly-web:${{ github.sha }} \
            ghcr.io/${{ github.repository_owner }}/barkly-web:${{ github.sha }}

          docker tag \
            barkly-web:${{ github.sha }} \
            ghcr.io/${{ github.repository_owner }}/barkly-web:latest

          docker push \
            ghcr.io/${{ github.repository_owner }}/barkly-web:${{ github.sha }}

          docker push \
            ghcr.io/${{ github.repository_owner }}/barkly-web:latest