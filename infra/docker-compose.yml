services:
  postgres:
    image: postgres:18
    container_name: barkly-postgres
    environment:
      POSTGRES_DB: barkly
      POSTGRES_USER: barkly
      POSTGRES_PASSWORD: barkly
    ports:
      - "5433:5432"
    volumes:
      - barkly-postgres-data:/var/lib/postgresql

volumes:
  barkly-postgres-data: